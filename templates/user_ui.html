{% extends "base.html" %}

{% block title %}Metingen{% endblock %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='user_ui.css') }}">
{% endblock %}

{% block content %}

<div class="card-row">
    <div id="sport-card"></div>
    <div id="binnenbuiten-card"></div>
</div>

<div class="card-row">
    <div id="fijnstof-card"></div>
    <div id="gassen-card"></div>
</div>

<script>
function kleurNaarTekst(kleur) {
    if (kleur === "green") return "goed";
    if (kleur === "orange") return "matig";
    if (kleur === "red") return "slecht";
    return "onbekend";
}

function updateMetingen(raw) {

    const fijn = raw.groups.fijnstof;   
    const gas  = raw.groups.gassen;

    const fijnText = kleurNaarTekst(fijn);
    const gasText  = kleurNaarTekst(gas);

    document.querySelector("#fijnstof-card").innerHTML = `
        <div class="simple-card ${fijn}" data-tooltip="Fijnstof: PM1, PM2.5 en PM10">
            <img src="/static/img/factory.png" class="card-icon">
            <h3>Fijnstof</h3>
            <div class="advies">${fijnText}</div>
            <p class="sub">Laatste meting</p>
        </div>
    `;

    document.querySelector("#gassen-card").innerHTML = `
        <div class="simple-card ${gas}" data-tooltip="Gassen: CO2, TVOC en AQI">
            <img src="/static/img/gasicon.png" class="card-icon">
            <h3>Gassen</h3>
            <div class="advies">${gasText}</div>
            <p class="sub">Laatste meting</p>
        </div>
    `;
}

function updateAdvies(raw) {
    const bb = raw.advies.binnenbuiten;
    const sp = raw.advies.sport;

    document.querySelector("#binnenbuiten-card").innerHTML = `
        <div class="advies-card ${bb.color}">
            <img src="/static/img/${bb.icon}" class="advies-icon">
            <div class="advies-tekst">${bb.text}</div>
        </div>
    `;

    document.querySelector("#sport-card").innerHTML = `
        <div class="advies-card ${sp.color}">
            <img src="/static/img/${sp.icon}" class="advies-icon">
            <div class="advies-tekst">${sp.text}</div>
        </div>
    `;
}

function fetchLatest() {
    fetch("/api/latest")
        .then(r => r.json())
        .then(updateMetingen)
        .catch(err => console.error("Latest error:", err));
}

function fetchAverage() {
    fetch("/api/average")
        .then(r => r.json())
        .then(updateAdvies)
        .catch(err => console.error("Average error:", err));
}

fetchLatest();
fetchAverage();

setInterval(fetchLatest, 10000);
setInterval(fetchAverage, 30000);
</script>


{% endblock %}
