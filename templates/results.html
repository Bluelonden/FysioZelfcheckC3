{% extends "base.html" %}

{% block title %}Live Metingen{% endblock %}

{% block style %}
<link rel="stylesheet" href="{{ url_for('static', filename='results.css') }}">
{% endblock %}

{% block script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}


{% block content %}
<div class="dashboard-container">

  <main class="main-content">

    <header class="header card">
      <h1>Live Luchtkwaliteitsmetingen</h1>
    </header>

    <div class="card p-3" style="margin-bottom: 25px;">

      <div class="status-card" data-metric="pm25">
        <h3>PM2.5</h3>
        <p class="score-value">–</p>
      </div>

      <div class="status-card" data-metric="pm10">
        <h3>PM10</h3>
        <p class="score-value">–</p>
      </div>

      <div class="status-card" data-metric="pm1">
        <h3>PM1</h3>
        <p class="score-value">–</p>
      </div>

      <div class="status-card" data-metric="co2">
        <h3>CO₂</h3>
        <p class="score-value">–</p>
      </div>

      <div class="status-card" data-metric="tvoc">
        <h3>TVOC</h3>
        <p class="score-value">–</p>
      </div>

      <div class="status-card" data-metric="aqi">
        <h3>AQI</h3>
        <p class="score-value">–</p>
      </div>

    </div>
</div>

<!-- GRAPHS -->
<div class="metrics-grid">

  <div class="metric-card card">
    <h3>PM2.5</h3>
    <div style="position: relative; height:260px;">
      <canvas id="pm25_graph"></canvas>
    </div>
  </div>

  <div class="metric-card card">
    <h3>PM10</h3>
    <div style="position: relative; height:260px;">
      <canvas id="pm10_graph"></canvas>
    </div>
  </div>

  <div class="metric-card card">
    <h3>PM1 </h3>
    <div style="position: relative; height:260px;">
      <canvas id="pm1_graph"></canvas>
    </div>
  </div>

  <div class="metric-card card">
    <h3>AQI </h3>
    <div style="position: relative; height:260px;">
      <canvas id="aqi_graph"></canvas>
    </div>
  </div>

  <div class="metric-card card">
    <h3>CO₂</h3>
    <div style="position: relative; height:260px;">
      <canvas id="co2_graph"></canvas>
    </div>
  </div>

  <div class="metric-card card">
    <h3>TVOC </h3>
    <div style="position: relative; height:260px;">
      <canvas id="tvoc_graph"></canvas>
    </div>
  </div>

</div>

</main>
</div>


<script>
  /* -----------------------------------------
     GRAFIEKEN
  ------------------------------------------*/
  const charts = {};

  function createChart(canvasId, label, color) {
    const ctx = document.getElementById(canvasId).getContext("2d");
    charts[canvasId] = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: label,
          data: [],
          borderColor: color,
          backgroundColor: color + "33",
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  createChart("pm25_graph", "PM2.5 (µg/m³)", "rgb(255, 99, 132)");
  createChart("pm10_graph", "PM10 (µg/m³)", "rgb(255, 159, 64)");
  createChart("pm1_graph", "PM1 (µg/m³)", "rgb(75, 192, 192)");
  createChart("aqi_graph", "AQI", "rgb(153, 102, 255)");
  createChart("co2_graph", "CO₂ (ppm)", "rgb(54, 162, 235)");
  createChart("tvoc_graph", "TVOC (ppb)", "rgb(255, 205, 86)");

  function updateGraph(canvasId, endpoint) {
    fetch(endpoint)
      .then(r => r.json())
      .then(json => {
        const chart = charts[canvasId];
        chart.data.labels = json.labels;
        chart.data.datasets[0].data = json.values;
        chart.update();
      });
  }

  function updateAllGraphs() {
    updateGraph("pm25_graph", "/api/pm25_fig");
    updateGraph("pm10_graph", "/api/pm10_fig");
    updateGraph("pm1_graph", "/api/pm1_fig");
    updateGraph("aqi_graph", "/api/aqi_fig");
    updateGraph("co2_graph", "/api/co2_fig");
    updateGraph("tvoc_graph", "/api/tvoc_fig");
  }

  setInterval(updateAllGraphs, 5000);
  updateAllGraphs();

  function updateStatusCards() {
    fetch("/api/latest")
      .then(r => r.json())
      .then(data => {
        const s = data.status;
        const v = data;

        document.querySelectorAll(".status-card").forEach(card => {
          const key = card.dataset.metric;

          card.classList.remove("status-good", "status-matig", "status-slecht");

          if (s[key] === "goed") card.classList.add("status-good");
          if (s[key] === "matig") card.classList.add("status-matig");
          if (s[key] === "slecht") card.classList.add("status-slecht");

          card.setAttribute("data-status", s[key]);

          card.querySelector(".score-value").textContent = v[key];
        });
      });
  }

  updateStatusCards();
  setInterval(updateStatusCards, 5000);



</script>
{% endblock %}
