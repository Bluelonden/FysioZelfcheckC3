{% extends "base.html" %}

{% block title %}
results
{% endblock %}

{% block script %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<div class="custom-containerv3">
  <h2><strong>Live metingen</strong></h2>
  <br>

  <div class="status-row">
    <div class="status-item"><span>PM2.5</span>
      <div id="pm25_icon" class="status-icon"></div>
    </div>
    <div class="status-item"><span>PM10</span>
      <div id="pm10_icon" class="status-icon"></div>
    </div>
    <div class="status-item"><span>PM1</span>
      <div id="pm1_icon" class="status-icon"></div>
    </div>
    <div class="status-item"><span>CO₂</span>
      <div id="co2_icon" class="status-icon"></div>
    </div>
    <div class="status-item"><span>TVOC</span>
      <div id="tvoc_icon" class="status-icon"></div>
    </div>
    <div class="status-item"><span>AQI</span>
      <div id="aqi_icon" class="status-icon"></div>
    </div>
  </div>

  <br>

  <div class="graph-grid">
    <canvas id="pm25_graph" class="graph-item"></canvas>
    <canvas id="pm10_graph" class="graph-item"></canvas>
    <canvas id="pm1_graph" class="graph-item"></canvas>
    <canvas id="aqi_graph" class="graph-item"></canvas>
    <canvas id="co2_graph" class="graph-item"></canvas>
    <canvas id="tvoc_graph" class="graph-item"></canvas>
  </div>
</div>

<!-- AI gegenereerde JS ik kan dat zelf nog niet maken-->

<script>
  const charts = {};

  function createChart(canvasId, label, color) {
    const ctx = document.getElementById(canvasId).getContext("2d");
    charts[canvasId] = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          label: label,
          data: [],
          borderColor: color,
          backgroundColor: color + "33",
          tension: 0.2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,  // Om de grootte van de grafiek aan te kunnen passen
        animation: false,
        scales: {
          y: { beginAtZero: true }
        }
      }

    });
  }

  createChart("pm25_graph", "PM2.5 (µg/m³)", "rgb(255, 99, 132)");
  createChart("pm10_graph", "PM10 (µg/m³)", "rgb(255, 159, 64)");
  createChart("pm1_graph", "PM1 (µg/m³)", "rgb(75, 192, 192)");
  createChart("aqi_graph", "AQI", "rgb(153, 102, 255)");
  createChart("co2_graph", "CO₂ (ppm)", "rgb(54, 162, 235)");
  createChart("tvoc_graph", "TVOC (ppb)", "rgb(255, 205, 86)");

  function updateGraph(canvasId, endpoint) {
    fetch(endpoint)
      .then(r => r.json())
      .then(json => {
        const chart = charts[canvasId];
        chart.data.labels = json.labels;
        chart.data.datasets[0].data = json.values;
        chart.update();
      });
  }

  function updateAllGraphs() {
    updateGraph("pm25_graph", "/api/pm25_fig");
    updateGraph("pm10_graph", "/api/pm10_fig");
    updateGraph("pm1_graph", "/api/pm1_fig");
    updateGraph("aqi_graph", "/api/aqi_fig");
    updateGraph("co2_graph", "/api/co2_fig");
    updateGraph("tvoc_graph", "/api/tvoc_fig");
  }

  setInterval(updateAllGraphs, 5000);
  updateAllGraphs();
</script>

<script>
  function updateStatusIcons() {
    fetch("/api/latest")
      .then(r => r.json())
      .then(data => {
        const s = data.status;
        document.getElementById("pm25_icon").style.backgroundColor = s.pm25;
        document.getElementById("pm10_icon").style.backgroundColor = s.pm10;
        document.getElementById("pm1_icon").style.backgroundColor = s.pm1;
        document.getElementById("co2_icon").style.backgroundColor = s.co2;
        document.getElementById("tvoc_icon").style.backgroundColor = s.tvoc;
        document.getElementById("aqi_icon").style.backgroundColor = s.aqi;
      });
  }

  updateStatusIcons();
  setInterval(updateStatusIcons, 5000);
</script>

{% endblock %}
