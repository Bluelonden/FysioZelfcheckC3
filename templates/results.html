{% extends "base.html" %}

{% block title %}
<title>results</title>

<!-- SCRIPT -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
{% endblock %}

{% block content %}
<div class="custom-containerv3">
  <h2>Live metingen</h2>
  <br>

  <div class="graph-grid">
    <div id="pm25_graph" class="graph-item"></div>
    <div id="pm10_graph" class="graph-item"></div>
    <div id="pm1_graph" class="graph-item"></div>
    <div id="aqi_graph" class="graph-item"></div>
    <div id="co2_graph" class="graph-item"></div>
    <div id="tvoc_graph" class="graph-item"></div>
  </div>

  <script>
    function updateGraph(id, endpoint) {
      fetch(endpoint)
        .then(r => r.json())
        .then(fig => Plotly.react(id, fig.data, fig.layout, { displayModeBar: false, responsive: true }));
    }

    function updateAllGraphs() {
      updateGraph("pm25_graph", "/api/pm25_fig");
      updateGraph("pm10_graph", "/api/pm10_fig");
      updateGraph("pm1_graph", "/api/pm1_fig");
      updateGraph("aqi_graph", "/api/aqi_fig");
      updateGraph("co2_graph", "/api/co2_fig");
      updateGraph("tvoc_graph", "/api/tvoc_fig");
    }

    setInterval(updateAllGraphs, 5000);
    updateAllGraphs();
  </script>
</div>

{% endblock %}
